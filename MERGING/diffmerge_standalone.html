<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiffMerge — Comparateur de fichiers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg: #0e0f11;
  --bg-panel: #13151a;
  --bg-card: #181b22;
  --border: #2a2d38;
  --border-accent: #3d4157;
  --text: #d4d8e8;
  --text-muted: #5a6080;
  --text-dim: #3d4260;
  --a-color: #4a8fff;
  --a-bg: rgba(74,143,255,0.08);
  --a-border: rgba(74,143,255,0.25);
  --b-color: #a78bfa;
  --b-bg: rgba(167,139,250,0.08);
  --b-border: rgba(167,139,250,0.25);
  --added: #3ddc97;
  --added-bg: rgba(61,220,151,0.07);
  --added-border: rgba(61,220,151,0.2);
  --removed: #ff5f7e;
  --removed-bg: rgba(255,95,126,0.07);
  --removed-border: rgba(255,95,126,0.2);
  --merge-color: #f9c74f;
  --merge-bg: rgba(249,199,79,0.06);
  --pending-bg: rgba(249,199,79,0.07);
  --radius: 6px;
  --font-ui: 'Syne', sans-serif;
  --font-code: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 14px; line-height: 1.5; overflow-x: hidden; }

.grain { position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 20px; color: var(--merge-color); }
.logo-text { font-weight: 800; font-size: 16px; letter-spacing: 0.5px; }
.logo-badge { font-family: var(--font-code); font-size: 10px; background: var(--border); color: var(--text-muted); padding: 2px 6px; border-radius: 3px; letter-spacing: 1px; }
.topbar-actions { display: flex; gap: 10px; align-items: center; }

/* BUTTONS */
.btn { font-family: var(--font-ui); font-weight: 600; font-size: 13px; padding: 7px 18px; border-radius: var(--radius); border: 1px solid transparent; cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.3px; }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-primary { background: var(--merge-color); color: #0e0f11; border-color: var(--merge-color); }
.btn-primary:hover:not(:disabled) { background: #ffd87a; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
.btn-ghost:hover:not(:disabled) { border-color: var(--border-accent); color: var(--text); }
.btn-small { font-family: var(--font-ui); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); cursor: pointer; transition: all 0.12s; }
.btn-small:hover { border-color: var(--border-accent); color: var(--text); }

/* UPLOAD */
.upload-section { padding: 48px 24px; min-height: calc(100vh - 52px); display: flex; align-items: center; justify-content: center; }
.upload-grid { display: flex; align-items: center; gap: 24px; width: 100%; max-width: 820px; }
.upload-card { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 48px 32px; text-align: center; cursor: pointer; position: relative; transition: all 0.2s ease; overflow: hidden; }
.upload-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(249,199,79,0.04) 0%, transparent 60%); pointer-events: none; }
.upload-card:hover, .upload-card.drag-over { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.upload-card[data-side="a"]:hover, .upload-card[data-side="a"].drag-over { border-color: var(--a-border); }
.upload-card[data-side="b"]:hover, .upload-card[data-side="b"].drag-over { border-color: var(--b-border); }
.upload-card[data-side="a"].has-file { border-color: var(--a-border); background: var(--a-bg); }
.upload-card[data-side="b"].has-file { border-color: var(--b-border); background: var(--b-bg); }
.upload-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: 800; font-size: 20px; color: var(--text-muted); transition: all 0.2s; }
[data-side="a"]:hover .upload-icon, [data-side="a"].has-file .upload-icon { background: var(--a-bg); color: var(--a-color); border: 1px solid var(--a-border); }
[data-side="b"]:hover .upload-icon, [data-side="b"].has-file .upload-icon { background: var(--b-bg); color: var(--b-color); border: 1px solid var(--b-border); }
.upload-label { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 8px; }
.upload-hint { font-family: var(--font-code); font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }
.file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.file-info { margin-top: 16px; font-family: var(--font-code); font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.upload-divider { font-size: 22px; color: var(--text-dim); flex-shrink: 0; }

/* STATS BAR */
.stats-bar { display: flex; align-items: center; gap: 20px; padding: 10px 24px; background: var(--bg-panel); border-bottom: 1px solid var(--border); font-family: var(--font-code); font-size: 12px; flex-wrap: wrap; }
.stat { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-dot.added { background: var(--added); }
.stat-dot.removed { background: var(--removed); }
.stat-dot.equal { background: var(--border-accent); }
.stat-sep { color: var(--border-accent); }
.stats-actions { margin-left: auto; display: flex; gap: 8px; }

/* WORKSPACE */
.workspace { display: grid; grid-template-columns: 1fr 1fr 1fr; height: calc(100vh - 52px - 45px - 36px); overflow: hidden; }
.panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
.panel:last-child { border-right: none; }
.panel-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg-panel); flex-shrink: 0; }
.panel-label { font-weight: 800; font-size: 13px; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.panel-label.a { background: var(--a-bg); color: var(--a-color); border: 1px solid var(--a-border); }
.panel-label.b { background: var(--b-bg); color: var(--b-color); border: 1px solid var(--b-border); }
.panel-label.merge { background: var(--merge-bg); color: var(--merge-color); border: 1px solid rgba(249,199,79,0.3); }
.panel-title { font-family: var(--font-code); font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.panel-content { flex: 1; overflow-y: auto; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.panel-content::-webkit-scrollbar { width: 4px; }
.panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* DIFF LINES */
.diff-line { display: flex; align-items: flex-start; font-family: var(--font-code); font-size: 12px; line-height: 1.7; border-bottom: 1px solid transparent; min-height: 28px; border-left: 2px solid transparent; }
.line-num { width: 42px; min-width: 42px; text-align: right; padding: 4px 10px 4px 8px; color: var(--text-dim); font-size: 11px; user-select: none; flex-shrink: 0; border-right: 1px solid var(--border); }
.line-prefix { width: 18px; min-width: 18px; text-align: center; padding: 4px 0; font-weight: 700; flex-shrink: 0; color: var(--text-dim); }
.line-text { flex: 1; padding: 4px 12px; white-space: pre; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.diff-line.added { background: var(--added-bg); border-left-color: var(--added); }
.diff-line.added .line-prefix { color: var(--added); }
.diff-line.added .line-text { color: var(--added); }
.diff-line.removed { background: var(--removed-bg); border-left-color: var(--removed); }
.diff-line.removed .line-prefix { color: var(--removed); }
.diff-line.removed .line-text { color: var(--removed); text-decoration: line-through; opacity: 0.7; }
.diff-line.ghost { opacity: 0; pointer-events: none; }

/* MERGE LINES */
.merge-line { display: flex; align-items: flex-start; font-family: var(--font-code); font-size: 12px; line-height: 1.7; min-height: 28px; cursor: pointer; position: relative; transition: background 0.1s; border-left: 2px solid transparent; }
.merge-line.accepted { background: rgba(61,220,151,0.06); border-left-color: var(--added); }
.merge-line.accepted .line-text { color: var(--added); }
.merge-line.rejected { background: rgba(255,95,126,0.05); border-left-color: var(--removed); opacity: 0.45; }
.merge-line.rejected .line-text { text-decoration: line-through; color: var(--removed); }
.merge-line.pending { background: var(--pending-bg); border-left-color: var(--merge-color); }
.merge-line.pending .line-text { color: var(--merge-color); }
.merge-line.equal { cursor: default; }
.merge-line:hover:not(.equal) { filter: brightness(1.2); }
.merge-actions { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); gap: 4px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; z-index: 10; }
.merge-line:hover .merge-actions { display: flex; }
.merge-action-btn { font-size: 11px; padding: 1px 6px; border-radius: 3px; border: none; cursor: pointer; font-family: var(--font-ui); font-weight: 600; }
.merge-action-btn.accept { background: var(--added-bg); color: var(--added); }
.merge-action-btn.reject { background: var(--removed-bg); color: var(--removed); }
.merge-action-btn.accept:hover { background: rgba(61,220,151,0.18); }
.merge-action-btn.reject:hover { background: rgba(255,95,126,0.18); }

/* LEGEND */
.legend { display: flex; align-items: center; gap: 20px; padding: 8px 24px; border-top: 1px solid var(--border); background: var(--bg); font-family: var(--font-code); font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.legend-dot.added { background: var(--added); }
.legend-dot.removed { background: var(--removed); }
.legend-dot.equal { background: var(--border-accent); }
.legend-dot.pending { background: var(--merge-color); }
.legend-sep { color: var(--border); }

/* UTILS */
.hidden { display: none !important; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-family: var(--font-code); font-size: 12px; gap: 8px; }
.empty-state-icon { font-size: 28px; opacity: 0.3; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.workspace:not(.hidden), .stats-bar:not(.hidden) { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>
  <div class="grain"></div>

  <header class="topbar">
    <div class="topbar-brand">
      <span class="logo-icon">⊕</span>
      <span class="logo-text">DiffMerge</span>
      <span class="logo-badge">MVP</span>
    </div>
    <div class="topbar-actions">
      <button id="btn-compare" class="btn btn-primary" disabled>Comparer</button>
      <button id="btn-export" class="btn btn-ghost" disabled>Exporter</button>
    </div>
  </header>

  <section class="upload-section" id="upload-section">
    <div class="upload-grid">
      <div class="upload-card" id="drop-a" data-side="a">
        <div class="upload-icon">A</div>
        <div class="upload-label">Document original</div>
        <div class="upload-hint">Glisser-déposer ou cliquer</div>
        <input type="file" id="file-a" accept=".txt,.html,.css,.js,.ts,.json,.md,.xml,.svg" class="file-input" />
        <div class="file-info" id="file-info-a"></div>
      </div>
      <div class="upload-divider">↔</div>
      <div class="upload-card" id="drop-b" data-side="b">
        <div class="upload-icon">B</div>
        <div class="upload-label">Document modifié</div>
        <div class="upload-hint">Glisser-déposer ou cliquer</div>
        <input type="file" id="file-b" accept=".txt,.html,.css,.js,.ts,.json,.md,.xml,.svg" class="file-input" />
        <div class="file-info" id="file-info-b"></div>
      </div>
    </div>
  </section>

  <div class="stats-bar hidden" id="stats-bar">
    <span class="stat"><span class="stat-dot added"></span><span id="stat-added">0</span> ajouts</span>
    <span class="stat"><span class="stat-dot removed"></span><span id="stat-removed">0</span> suppressions</span>
    <span class="stat"><span class="stat-dot equal"></span><span id="stat-equal">0</span> inchangées</span>
    <span class="stat-sep">|</span>
    <span class="stat" id="stat-pending">—</span>
    <div class="stats-actions">
      <button class="btn-small" id="btn-accept-all">Tout accepter (B)</button>
      <button class="btn-small" id="btn-reject-all">Tout rejeter</button>
    </div>
  </div>

  <main class="workspace hidden" id="workspace">
    <div class="panel panel-a">
      <div class="panel-header">
        <span class="panel-label a">A</span>
        <span class="panel-title" id="panel-title-a">—</span>
      </div>
      <div class="panel-content" id="diff-a"></div>
    </div>
    <div class="panel panel-merge">
      <div class="panel-header">
        <span class="panel-label merge">✓</span>
        <span class="panel-title">Résultat fusionné</span>
      </div>
      <div class="panel-content" id="diff-merge"></div>
    </div>
    <div class="panel panel-b">
      <div class="panel-header">
        <span class="panel-label b">B</span>
        <span class="panel-title" id="panel-title-b">—</span>
      </div>
      <div class="panel-content" id="diff-b"></div>
    </div>
  </main>

  <footer class="legend hidden" id="legend">
    <span class="legend-item"><span class="legend-dot added"></span>Ajout</span>
    <span class="legend-item"><span class="legend-dot removed"></span>Suppression</span>
    <span class="legend-item"><span class="legend-dot equal"></span>Inchangé</span>
    <span class="legend-item"><span class="legend-dot pending"></span>En attente</span>
    <span class="legend-sep">|</span>
    <span class="legend-item">Survoler une ligne modifiée → ✓ / ✗ · Clic = toggle</span>
  </footer>

<script>
// ============================================================
// DIFF ENGINE — LCS (Longest Common Subsequence)
// ============================================================
function buildLCSTable(a, b) {
  const m = a.length, n = b.length;
  const dp = new Array(m + 1);
  for (let i = 0; i <= m; i++) dp[i] = new Int32Array(n + 1);
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  return dp;
}

function backtrack(dp, a, b) {
  const result = [];
  let i = a.length, j = b.length;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      result.push({ type: 'equal',   text: a[i-1], lineA: i-1, lineB: j-1 }); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      result.push({ type: 'added',   text: b[j-1], lineA: null, lineB: j-1 }); j--;
    } else {
      result.push({ type: 'removed', text: a[i-1], lineA: i-1, lineB: null }); i--;
    }
  }
  return result.reverse();
}

function computeDiff(textA, textB) {
  const linesA = textA.split('\n');
  const linesB = textB.split('\n');
  return backtrack(buildLCSTable(linesA, linesB), linesA, linesB);
}

function diffStats(diff) {
  let added = 0, removed = 0, equal = 0;
  for (const c of diff) { if (c.type==='added') added++; else if (c.type==='removed') removed++; else equal++; }
  return { added, removed, equal };
}

// ============================================================
// MERGE STATE
// ============================================================
const mergeState = {
  diff: [], decisions: [],
  init(diff) {
    this.diff = diff;
    this.decisions = diff.map(c => c.type === 'equal' ? 'accepted' : 'pending');
  },
  accept(i)  { if (this.diff[i].type !== 'equal') this.decisions[i] = 'accepted'; },
  reject(i)  { if (this.diff[i].type !== 'equal') this.decisions[i] = 'rejected'; },
  toggle(i)  {
    if (this.diff[i].type === 'equal') return;
    const d = this.decisions[i];
    this.decisions[i] = d === 'pending' ? 'accepted' : d === 'accepted' ? 'rejected' : 'accepted';
  },
  acceptAll() { this.decisions = this.diff.map(() => 'accepted'); },
  rejectAll()  { this.decisions = this.diff.map(c => c.type === 'equal' ? 'accepted' : 'rejected'); },
  pendingCount() { return this.decisions.filter((d,i) => d==='pending' && this.diff[i].type!=='equal').length; },
  buildResult() {
    const lines = [];
    for (let i = 0; i < this.diff.length; i++) {
      const { type, text } = this.diff[i];
      const d = this.decisions[i];
      if (type === 'equal') lines.push(text);
      else if (type === 'added'   && (d==='accepted'||d==='pending')) lines.push(text);
      else if (type === 'removed' && (d==='rejected'||d==='pending')) lines.push(text);
    }
    return lines.join('\n');
  }
};

// ============================================================
// PARSERS / EXPORT
// ============================================================
const SUPPORTED_EXT = ['.txt','.html','.htm','.css','.js','.ts','.json','.md','.xml','.svg'];

function isSupported(file) {
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  return SUPPORTED_EXT.includes(ext) || file.type.startsWith('text/');
}

function readTextFile(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error('Lecture impossible : ' + file.name));
    r.readAsText(file, 'UTF-8');
  });
}

async function parseFile(file) {
  if (isSupported(file)) return readTextFile(file);
  throw new Error('Format non supporté : ' + (file.name.split('.').pop() || file.type));
}

function exportFile(content, filename) {
  const ext = filename.split('.').pop().toLowerCase();
  const mime = { html:'text/html', htm:'text/html', css:'text/css', js:'text/javascript' }[ext] || 'text/plain';
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ============================================================
// APP CONTROLLER
// ============================================================
const appState = { fileA:null, fileB:null, contentA:null, contentB:null, diff:null };

const $  = id => document.getElementById(id);
const uploadSection = $('upload-section');
const workspace     = $('workspace');
const statsBar      = $('stats-bar');
const legend        = $('legend');
const dropA = $('drop-a'), dropB = $('drop-b');
const fileInputA = $('file-a'), fileInputB = $('file-b');
const fileInfoA  = $('file-info-a'), fileInfoB = $('file-info-b');
const btnCompare = $('btn-compare'), btnExport = $('btn-export');
const btnAcceptAll = $('btn-accept-all'), btnRejectAll = $('btn-reject-all');
const diffA = $('diff-a'), diffB = $('diff-b'), diffMerge = $('diff-merge');
const panelTitleA = $('panel-title-a'), panelTitleB = $('panel-title-b');
const statAdded = $('stat-added'), statRemoved = $('stat-removed');
const statEqual = $('stat-equal'), statPending = $('stat-pending');

function escapeHtml(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatSize(b) {
  if (b<1024) return b+' o';
  if (b<1048576) return (b/1024).toFixed(1)+' Ko';
  return (b/1048576).toFixed(1)+' Mo';
}
function showError(msg) {
  const t = document.createElement('div');
  t.textContent = '⚠ ' + msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
    background:'#2a1515', color:'#ff5f7e', border:'1px solid #ff5f7e44',
    padding:'10px 20px', borderRadius:'6px', fontFamily:'monospace',
    fontSize:'12px', zIndex:'9999', whiteSpace:'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function setupUpload(dropEl, inputEl, infoEl, side) {
  dropEl.addEventListener('click', e => { if (e.target !== inputEl) inputEl.click(); });
  inputEl.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0], side, infoEl, dropEl); });
  dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('drag-over'); });
  dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag-over'));
  dropEl.addEventListener('drop', e => {
    e.preventDefault(); dropEl.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0], side, infoEl, dropEl);
  });
}

async function handleFile(file, side, infoEl, dropEl) {
  if (!isSupported(file)) { showError('Format non supporté : ' + file.name); return; }
  try {
    const content = await parseFile(file);
    if (side === 'a') { appState.fileA = file; appState.contentA = content; panelTitleA.textContent = file.name; }
    else              { appState.fileB = file; appState.contentB = content; panelTitleB.textContent = file.name; }
    infoEl.textContent = file.name + ' · ' + formatSize(file.size);
    dropEl.classList.add('has-file');
    btnCompare.disabled = !(appState.contentA !== null && appState.contentB !== null);
  } catch(err) { showError(err.message); }
}

btnCompare.addEventListener('click', () => {
  const diff = computeDiff(appState.contentA, appState.contentB);
  appState.diff = diff;
  mergeState.init(diff);
  uploadSection.classList.add('hidden');
  workspace.classList.remove('hidden');
  statsBar.classList.remove('hidden');
  legend.classList.remove('hidden');
  btnExport.disabled = false;
  renderAll();
});

// ---- RENDER ----
function renderAll() {
  renderDiffPanel(diffA, appState.diff, 'a');
  renderDiffPanel(diffB, appState.diff, 'b');
  renderMergePanel();
  updateStats();
}

function makeDiffLine(num, html, prefix, type) {
  const div = document.createElement('div');
  div.className = 'diff-line ' + (type||'');
  const n = document.createElement('span'); n.className = 'line-num'; n.textContent = num||'';
  const p = document.createElement('span'); p.className = 'line-prefix'; p.textContent = prefix||'';
  const t = document.createElement('span'); t.className = 'line-text'; t.innerHTML = html;
  div.appendChild(n); div.appendChild(p); div.appendChild(t);
  return div;
}

function renderDiffPanel(container, diff, side) {
  container.innerHTML = '';
  if (!diff.length) {
    container.innerHTML = '<div class="empty-state"><span class="empty-state-icon">∅</span>Fichier vide</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  let lineNum = 0;
  for (let i = 0; i < diff.length; i++) {
    const c = diff[i];
    if (side==='a' && c.type==='added')   { frag.appendChild(makeDiffLine('','&nbsp;','','ghost')); continue; }
    if (side==='b' && c.type==='removed') { frag.appendChild(makeDiffLine('','&nbsp;','','ghost')); continue; }
    lineNum++;
    const prefix = c.type==='added' ? '+' : c.type==='removed' ? '−' : '';
    const el = makeDiffLine(lineNum, escapeHtml(c.text)||'&nbsp;', prefix, c.type);
    el.dataset.index = i;
    frag.appendChild(el);
  }
  container.appendChild(frag);
}

function makeMergeLine(index, chunk, decision) {
  const div = document.createElement('div');
  div.className = 'merge-line ' + (chunk.type==='equal' ? 'equal' : decision);
  div.dataset.index = index;

  const n = document.createElement('span'); n.className = 'line-num';
  const p = document.createElement('span'); p.className = 'line-prefix';
  if (chunk.type==='added')   p.textContent = '+';
  if (chunk.type==='removed') p.textContent = '−';
  const t = document.createElement('span'); t.className = 'line-text';
  t.innerHTML = escapeHtml(chunk.text)||'&nbsp;';

  div.appendChild(n); div.appendChild(p); div.appendChild(t);

  if (chunk.type !== 'equal') {
    const acts = document.createElement('div');
    acts.className = 'merge-actions';

    const aBtn = document.createElement('button');
    aBtn.className = 'merge-action-btn accept';
    aBtn.textContent = decision==='accepted' ? '✓ accepté' : '✓';
    aBtn.title = chunk.type==='added' ? 'Accepter cet ajout' : 'Accepter cette suppression';

    const rBtn = document.createElement('button');
    rBtn.className = 'merge-action-btn reject';
    rBtn.textContent = decision==='rejected' ? '✗ rejeté' : '✗';
    rBtn.title = chunk.type==='added' ? 'Rejeter cet ajout' : 'Rejeter cette suppression';

    aBtn.addEventListener('click', e => { e.stopPropagation(); mergeState.accept(index); refreshMergeLine(index); updateStats(); });
    rBtn.addEventListener('click', e => { e.stopPropagation(); mergeState.reject(index); refreshMergeLine(index); updateStats(); });
    acts.appendChild(aBtn); acts.appendChild(rBtn);
    div.appendChild(acts);

    div.addEventListener('click', () => { mergeState.toggle(index); refreshMergeLine(index); updateStats(); });
  }
  return div;
}

function renderMergePanel() {
  diffMerge.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (let i = 0; i < mergeState.diff.length; i++)
    frag.appendChild(makeMergeLine(i, mergeState.diff[i], mergeState.decisions[i]));
  diffMerge.appendChild(frag);
}

function refreshMergeLine(index) {
  const el = diffMerge.querySelector('[data-index="'+index+'"]');
  if (el) diffMerge.replaceChild(makeMergeLine(index, mergeState.diff[index], mergeState.decisions[index]), el);
}

function updateStats() {
  const s = diffStats(appState.diff);
  statAdded.textContent   = s.added;
  statRemoved.textContent = s.removed;
  statEqual.textContent   = s.equal;
  const p = mergeState.pendingCount();
  statPending.textContent = p > 0 ? p + ' en attente de décision' : '✓ Toutes les décisions prises';
}

btnAcceptAll.addEventListener('click', () => { mergeState.acceptAll(); renderMergePanel(); updateStats(); });
btnRejectAll.addEventListener('click', () => { mergeState.rejectAll(); renderMergePanel(); updateStats(); });

btnExport.addEventListener('click', () => {
  const result = mergeState.buildResult();
  const name = appState.fileA?.name || 'document.txt';
  const ext  = name.split('.').pop();
  const base = name.replace(/\.[^.]+$/, '');
  exportFile(result, base + '_merged.' + ext);
});

// ---- INIT ----
setupUpload(dropA, fileInputA, fileInfoA, 'a');
setupUpload(dropB, fileInputB, fileInfoB, 'b');
</script>
</body>
</html>
